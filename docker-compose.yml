version: "3.8"
services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.13
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_DATA_DIR=/etcd-data
    volumes:
      - ./nodes/etcd:/etcd-data
    ports:
      - "2379:2379"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 5s
      retries: 5
  shrimpd-1:
    build: .
    command:
      - -id=shrimpd-1
      - -addr=shrimpd-1:8080
      - -data=/data
      - -etcd=etcd:2379
    ports:
      - "8080:8080"
    volumes:
      - ./nodes/node-1:/data
    depends_on:
      etcd:
        condition: service_healthy
  shrimpd-2:
    build: .
    command:
      - -id=shrimpd-2
      - -addr=shrimpd-2:8080
      - -data=/data
      - -etcd=etcd:2379
    ports:
      - "8081:8080"
    volumes:
      - ./nodes/node-2:/data
    depends_on:
      etcd:
        condition: service_healthy
  shrimpd-3:
    build: .
    command:
      - -id=shrimpd-3
      - -addr=shrimpd-3:8080
      - -data=/data
      - -etcd=etcd:2379
    ports:
      - "8082:8080"
    volumes:
      - ./nodes/node-3:/data
    depends_on:
      etcd:
        condition: service_healthy
